<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      width: 320px;
      background: #F5F5F5;
      color: #0F0F0F;
      font-size: 13px;
      font-weight: 300;
    }
    .header {
      background: #000;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
    }
    .header span { color: #25D366; }
    .body { padding: 16px; display: grid; gap: 12px; }
    label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6B6B6B;
    }
    .field { display: grid; gap: 4px; }
    input, select {
      border: none;
      border-bottom: 1px solid #E0E0E0;
      padding: 8px 0;
      font-size: 13px;
      font-family: inherit;
      font-weight: 300;
      color: #0F0F0F;
      background: transparent;
      outline: none;
    }
    input:focus, select:focus { border-bottom-color: #000; }
    .btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      min-height: 40px;
    }
    .btn:hover { background: #333; }
    .btn-ghost {
      background: transparent;
      color: #6B6B6B;
      border: 1px solid #E0E0E0;
    }
    .btn-ghost:hover { background: #E0E0E0; color: #0F0F0F; }
    .status {
      font-size: 11px;
      padding: 8px;
      display: none;
      text-align: center;
    }
    .status.ok { display: block; background: #E8F5E9; color: #1B5E20; }
    .status.err { display: block; background: #FDECEA; color: #B71C1C; }
    .step { display: none; }
    .step.active { display: grid; gap: 12px; }
    .connected-info {
      font-size: 12px;
      color: #6B6B6B;
      line-height: 1.5;
    }
    .connected-info strong { color: #0F0F0F; font-weight: 600; }
    .accent { color: #25D366; }
  </style>
</head>
<body>
  <div class="header">WA<span>/</span>Close</div>
  <div class="body">

    <!-- Step 1: Password -->
    <div class="step active" id="step-login">
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter dashboard password" />
      </div>
      <button class="btn" id="login-btn">Connect</button>
    </div>

    <!-- Step 2: Select Rep -->
    <div class="step" id="step-rep">
      <div class="field">
        <label>Who are you?</label>
        <select id="rep-select"><option value="">Loading...</option></select>
      </div>
      <button class="btn" id="save-rep-btn">Save</button>
    </div>

    <!-- Step 3: Connected -->
    <div class="step" id="step-done">
      <p class="connected-info">
        Signed in as <strong id="rep-name-display">—</strong><br />
        Status: <span class="accent" id="rep-status-display">—</span>
      </p>
      <button class="btn btn-ghost" id="change-btn">Change Rep</button>
      <button class="btn btn-ghost" id="logout-btn">Logout</button>
    </div>

    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
